<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Target - Create Goal</title>

    <!-- CSS DOCUMENTS -->
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/header.css">
    <link rel="stylesheet" href="../css/create-goal.css">
    <link rel="stylesheet" href="../css/footer.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- start of the header -->
    <header class="main-header">

        <button class="button-toggle">
            <span class="hamburguer-bar"></span>
            <span class="hamburguer-bar"></span>
            <span class="hamburguer-bar"></span>
        </button>

        <div class="logo-container">
            <a href="../index.html">
                <img src="../images/FX Target Logo.png" alt="">
                <span hidden>FX Target</span>
            </a>
        </div>



    </header>
    <!-- end of the header -->


    <!-- start of the form -->
    <main class="form-container">
        <div class="form-image">
            <img src="../images/pexels-rodeo-software-515182715-16368789.jpg" alt="">
        </div>

        <div class="form-stylized-title">
            <p>Criação do Projeto</p>
        </div>
        

        <form class="goal-form">
            <div class="form-row">
                <label for="">Nome do Projeto:</label>
                <input type="text">
            </div>

            <div class="form-row">
                <label for="">Reserva mensal:</label>
                <input type="number">
            </div>

            <div class="radio-group">
                <input type="radio" name="monthly-currency-choice" value="BRL">
                <label for="">BRL</label>

                <input type="radio" name="monthly-currency-choice" value="USD">
                <label for="">USD</label>

                <input type="radio" name="monthly-currency-choice" value="EUR">
                <label for="">EUR</label>
            </div>

            <div class="form-row">
                <label for="">Meta final:</label>
                <input type="number">
            </div>

            <div class="radio-group">
                <input type="radio" name="final-currency-choice" value="BRL">
                <label for="">BRL</label>

                <input type="radio" name="final-currency-choice" value="USD">
                <label for="">USD</label>

                <input type="radio" name="final-currency-choice" value="EUR">
                <label for="">EUR</label>
            </div>

            <div class="form-row">
                <label for="">Tempo de aplicação:</label>
                <input type="number">
            </div>

        </form>

        <div class="actions-interface">
            <a href="../index.html" class="btn-secondary">Voltar</a>
            <button type="submit" class="btn-primary">Calcular</button>
        </div>
    </main>
    <!-- end of the form -->

    <!-- start of the footer -->
    <footer class="footer">
        <p>Todos os Direitos Reservados ©</p>
    </footer>
    <!-- end of the footer -->
</body>

</html>
